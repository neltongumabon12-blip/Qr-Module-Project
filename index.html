<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GEE2</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Press Start 2P Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden;
      color: #fff;
    }

    /* ===== Background Video ===== */
    .bg-video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
    }

    /* Gradient overlay for elegance */
    .overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(
        rgba(0,0,0,0.55),
        rgba(0,0,0,0.35)
      );
      z-index: -1;
    }

    /* ===== Glass Container ===== */
    .container {
      max-width: 820px;
      margin: 8vh auto;
      padding: 40px 35px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 10px 40px rgba(0,0,0,0.35);
      text-align: center;
      border: 1px solid rgba(255,255,255,0.18);
    }

    /* Pixelated Title */
    h1 {
      font-family: 'Press Start 2P', cursive;
      font-size: 1.8rem;
      font-weight: 400;
      margin-bottom: 12px;
      line-height: 1.3;
      text-shadow: 0 4px 10px rgba(0,0,0,0.6);
    }

    p {
      font-size: 1.05rem;
      opacity: 0.95;
      letter-spacing: 0.6px;
      margin-bottom: 35px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    }

    /* ===== Button Inspired by Uploaded Image ===== */
    .btn {
      display: inline-block;
      padding: 16px 36px;
      font-size: 0.85rem;
      font-weight: 700;
      color: #ff00ff; /* neon pink */
      text-decoration: none;
      border-radius: 12px;
      border: 2px solid #ff00ff;
      background: linear-gradient(45deg, #000, #2a003f);
      box-shadow: 0 0 15px #ff00ff, 0 0 30px #ff00ff50;
      transition: all 0.3s ease;
      text-transform: uppercase;
    }

    .btn:hover {
      background: linear-gradient(45deg, #ff00ff, #ff66ff);
      box-shadow: 0 0 25px #ff00ff, 0 0 45px #ff00ff70;
      transform: translateY(-3px);
    }

    /* ===== Mobile tweaks ===== */
    @media (max-width: 768px) {
      .container {
        margin: 6vh 16px;
        padding: 30px 22px;
      }

      h1 {
        font-size: 1.4rem;
      }
    }
  </style>
</head>
<body>

  <!-- Background Video -->
  <video class="bg-video" autoplay muted loop playsinline>
    <source src="assets/video1.mp4" type="video/mp4">
  </video>

  <!-- Overlay -->
  <div class="overlay"></div>

  <!-- Content -->
  <div class="container">
    <h1>Pagbasa at Pagsulat Tungo sa Pananaliksik</h1>
    <p><strong>WEEK 7–11</strong></p>

    <a href="viewer.html" class="btn">View Module (PDF)</a>
  </div>

</body>
</html>
